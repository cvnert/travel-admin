name: Deploy Admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: 182.92.208.159
      DEPLOY_PORT: '22'
      DEPLOY_USER: root
      DEPLOY_PATH: /var/www/travel-admin
      SERVER_NAME: cvnert.com.cn www.cvnert.com.cn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.SERVER_PASSWORD }}"

      - name: Upload dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          port: ${{ env.DEPLOY_PORT }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: dist/*
          target: /tmp/travel-admin-dist
          overwrite: true

      - name: Publish and reload Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          port: ${{ env.DEPLOY_PORT }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -euo pipefail
            DEPLOY_PATH='${{ env.DEPLOY_PATH }}'
            SERVER_NAME='${{ env.SERVER_NAME }}'
            mkdir -p "$DEPLOY_PATH"
            find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            cp -R /tmp/travel-admin-dist/dist/. "$DEPLOY_PATH"/
            cat > /etc/nginx/sites-available/travel-admin <<EOF
            server {
                listen 80;
                listen 443 ssl;
                server_name $SERVER_NAME;

                root $DEPLOY_PATH;
                index index.html;

                ssl_certificate /etc/letsencrypt/live/cvnert.com.cn/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/cvnert.com.cn/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

                location /api/ {
                    proxy_pass http://127.0.0.1:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }

                location /uploads/ {
                    proxy_pass http://127.0.0.1:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }

                location / {
                    try_files \$uri \$uri/ /index.html;
                }
            }
            EOF
            ln -sfn /etc/nginx/sites-available/travel-admin /etc/nginx/sites-enabled/travel-admin
            rm -f /etc/nginx/sites-enabled/default
            nginx -t
            systemctl reload nginx
