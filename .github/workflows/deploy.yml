name: Deploy Admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Prepare remote server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 101.35.131.94
          username: ubuntu
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            DEPLOY_PATH="/var/www/travel-admin"
            case "$DEPLOY_PATH" in
              /var/www/*) ;;
              *) echo "DEPLOY_PATH must be under /var/www"; exit 1 ;;
            esac

            if ! command -v nginx >/dev/null 2>&1; then
              echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S apt-get update
              echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S apt-get install -y nginx
            fi

            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S mkdir -p "$DEPLOY_PATH"
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S chown -R "$USER":"$USER" "$DEPLOY_PATH"
            rm -rf /tmp/travel-admin-dist
            mkdir -p /tmp/travel-admin-dist

      - name: Upload dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 101.35.131.94
          username: ubuntu
          password: ${{ secrets.SERVER_PASSWORD }}
          source: dist/*
          target: /tmp/travel-admin-dist

      - name: Publish and reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 101.35.131.94
          username: ubuntu
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            DEPLOY_PATH="/var/www/travel-admin"
            case "$DEPLOY_PATH" in
              /var/www/*) ;;
              *) echo "DEPLOY_PATH must be under /var/www"; exit 1 ;;
            esac

            rm -rf "$DEPLOY_PATH"/*
            cp -R /tmp/travel-admin-dist/dist/. "$DEPLOY_PATH"/

            cat > /tmp/travel-admin-nginx.conf <<EOF
            server {
                listen 80;
                server_name _;

                root $DEPLOY_PATH;
                index index.html;

                location /api/ {
                    proxy_pass http://127.0.0.1:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }

                location /uploads/ {
                    proxy_pass http://127.0.0.1:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }

                location / {
                    try_files \$uri \$uri/ /index.html;
                }
            }
            EOF

            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S cp /tmp/travel-admin-nginx.conf /etc/nginx/sites-available/travel-admin
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S ln -sfn /etc/nginx/sites-available/travel-admin /etc/nginx/sites-enabled/travel-admin
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S rm -f /etc/nginx/sites-enabled/default
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S nginx -t
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S systemctl reload nginx
